name: yoltic_app
description: "YOLTIC — BLE Bridge for Zapotec Translation Smart Glasses"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_auth: ^4.17.0
  
  # BLE
  flutter_blue_plus: ^1.31.0
  
  # State Management
  provider: ^6.1.2
  
  # Utilities
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  intl: ^0.19.0
  firebase_database: ^10.5.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
